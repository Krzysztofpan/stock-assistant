services:
  redis:
    image: redis:7
    command: redis-server --port ${REDIS_PORT}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "${REDIS_PORT}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  backend:
    container_name: backend
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        BACKEND_PORT: ${BACKEND_PORT}
        UVICORN_HOST: ${UVICORN_HOST}
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: ${REDIS_PORT}
      BACKEND_PORT: ${BACKEND_PORT}
      FRONTEND_PORT: ${FRONTEND_PORT}
      UVICORN_HOST: ${UVICORN_HOST}
      UVICORN_TIMEOUT_GRACEFUL_SHUTDOWN: 3
      UVICORN_RELOAD_DELAY: 2
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import os, urllib.request; urllib.request.urlopen(f'http://127.0.0.1:{os.environ['BACKEND_PORT']}/health/ready')\"",
        ]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 120s
    command: uv run main.py
    restart: unless-stopped

  frontend:
    container_name: frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    env_file:
      - .env
    environment:
      BACKEND_HOST: backend
      BACKEND_PORT: ${BACKEND_PORT}
      PORT: ${FRONTEND_PORT}
    depends_on:
      redis:
        condition: service_started
      backend:
        condition: service_healthy
    restart: unless-stopped
    
volumes:
  redis_data:
