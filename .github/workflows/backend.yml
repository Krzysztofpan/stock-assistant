name: Backend

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: stock_assistant_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/stock_assistant_test
      REDIS_HOST: localhost
      REDIS_PORT: "6379"
      OPENAI_API_KEY: ci-dummy
      EODHD_API_KEY: ci-dummy
      FINNHUB_API_KEY: ci-dummy
      LANGSMITH_API_KEY: ci-dummy
      HF_TOKEN: ci-dummy
      JWT_SECRET: ci-jwt-secret-for-tests-only
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_SECONDS: "3600"
      LANGSMITH_TRACKING: "false"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group dev --frozen

      - name: Run migrations
        run: uv run aerich upgrade

      - name: Run tests
        run: uv run pytest
